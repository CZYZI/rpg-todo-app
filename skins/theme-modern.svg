<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#075985;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="planet-glow">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="10"/>
  <!-- Stars -->
  <circle cx="30" cy="30" r="1" fill="white"/>
  <circle cx="60" cy="50" r="1.5" fill="white"/>
  <circle cx="150" cy="25" r="1" fill="white"/>
  <circle cx="170" cy="60" r="1.5" fill="white"/>
  <circle cx="90" cy="35" r="1" fill="white"/>
  <circle cx="130" cy="80" r="1" fill="white"/>
  <circle cx="50" cy="100" r="1.5" fill="white"/>
  <!-- Planet -->
  <circle cx="150" cy="150" r="40" fill="#0ea5e9" opacity="0.7"/>
  <circle cx="150" cy="150" r="40" fill="url(#planet-glow)"/>
  <!-- Spaceship -->
  <path d="M 60 130 L 90 110 L 100 115 L 95 125 L 85 130 Z" fill="#e2e8f0"/>
  <path d="M 95 125 L 110 120 L 105 130 L 95 125" fill="#f97316"/>
  <!-- Text -->
  <text x="100" y="190" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="bold">星际远征</text>
</svg>
