<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="10"/>
  <!-- Hood -->
  <path d="M 70 80 Q 100 40 130 80" fill="#6b7280"/>
  <!-- Face -->
  <circle cx="100" cy="85" r="25" fill="#d1d5db"/>
  <!-- Eyes - sneaky -->
  <path d="M 88 80 L 95 83" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <path d="M 105 83 L 112 80" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Smirk -->
  <path d="M 95 92 Q 100 90 105 92" stroke="#1f2937" stroke-width="2" fill="none"/>
  <!-- Body - dark cloak -->
  <path d="M 60 110 L 140 110 L 130 180 L 70 180 Z" fill="#374151"/>
  <!-- Dagger -->
  <line x1="140" y1="120" x2="155" y2="135" stroke="#9ca3af" stroke-width="3"/>
  <path d="M 155 135 L 160 130 L 155 135 L 158 138 Z" fill="#d1d5db"/>
  <!-- Text -->
  <text x="100" y="195" text-anchor="middle" fill="#9ca3af" font-size="14" font-weight="bold">盗贼</text>
</svg>
