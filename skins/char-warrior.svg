<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="10"/>
  <!-- Helmet -->
  <path d="M 65 85 Q 100 55 135 85 L 130 95 L 70 95 Z" fill="#9ca3af"/>
  <!-- Helmet visor -->
  <rect x="80" y="85" width="40" height="10" fill="#1f2937" opacity="0.7"/>
  <!-- Face guard -->
  <path d="M 80 85 L 80 95" stroke="#6b7280" stroke-width="3"/>
  <path d="M 120 85 L 120 95" stroke="#6b7280" stroke-width="3"/>
  <!-- Shoulder armor -->
  <circle cx="65" cy="115" r="15" fill="#6b7280"/>
  <circle cx="135" cy="115" r="15" fill="#6b7280"/>
  <!-- Chest armor -->
  <path d="M 70 110 L 130 110 L 125 170 L 75 170 Z" fill="#9ca3af"/>
  <!-- Armor detail -->
  <path d="M 95 110 L 95 170" stroke="#6b7280" stroke-width="2"/>
  <path d="M 105 110 L 105 170" stroke="#6b7280" stroke-width="2"/>
  <!-- Sword -->
  <line x1="150" y1="115" x2="150" y2="170" stroke="#6b7280" stroke-width="5"/>
  <path d="M 150 115 L 150 105 L 155 110 L 150 115 L 145 110 Z" fill="#d1d5db"/>
  <!-- Text -->
  <text x="100" y="195" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="bold">战士</text>
</svg>
