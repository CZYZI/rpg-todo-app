<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="10"/>
  <!-- Grid lines -->
  <line x1="0" y1="50" x2="200" y2="50" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="150" x2="200" y2="150" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <line x1="50" y1="0" x2="50" y2="200" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <!-- Buildings -->
  <rect x="20" y="80" width="40" height="90" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <rect x="80" y="50" width="40" height="120" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <rect x="140" y="65" width="35" height="105" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <!-- Neon signs -->
  <text x="30" y="105" fill="#ec4899" font-size="8" font-weight="bold">NEON</text>
  <text x="90" y="130" fill="#10b981" font-size="8" font-weight="bold">CYBER</text>
  <text x="145" y="115" fill="#f59e0b" font-size="8" font-weight="bold">PUNK</text>
  <!-- Text -->
  <text x="100" y="190" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">霓虹都市</text>
</svg>
