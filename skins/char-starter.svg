<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="10"/>
  <!-- Body -->
  <circle cx="100" cy="80" r="30" fill="#fcd34d"/>
  <!-- Eyes -->
  <circle cx="90" cy="75" r="4" fill="#1f2937"/>
  <circle cx="110" cy="75" r="4" fill="#1f2937"/>
  <!-- Smile -->
  <path d="M 90 85 Q 100 95 110 85" stroke="#1f2937" stroke-width="2" fill="none"/>
  <!-- Body armor -->
  <rect x="70" y="110" width="60" height="60" rx="10" fill="#3b82f6"/>
  <!-- Armor detail -->
  <rect x="85" y="110" width="30" height="60" rx="5" fill="#60a5fa"/>
  <!-- Legs -->
  <rect x="80" y="170" width="15" height="20" rx="5" fill="#1e40af"/>
  <rect x="105" y="170" width="15" height="20" rx="5" fill="#1e40af"/>
  <!-- Text -->
  <text x="100" y="195" text-anchor="middle" fill="white" font-size="14" font-weight="bold">初心者</text>
</svg>
